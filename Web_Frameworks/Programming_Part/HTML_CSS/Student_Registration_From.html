<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            align-items: center;
            padding-top: 5px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .submit-btn {
            width: 100%;
            background-color: #ff0000; /* Matching the red button from the image */
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration Form</h2>
    
    <form action="#" method="post">
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="student_name" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Mobile No</label>
                <input type="tel" name="mobile" required>
            </div>
            <div class="form-group">
                <label>Email Id</label>
                <input type="email" name="email" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Father Name</label>
                <input type="text" name="father_name">
            </div>
            <div class="form-group">
                <label>Mother Name</label>
                <input type="text" name="mother_name">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Select Course</label>
                <select name="course">
                    <option value="">Select...</option>
                    <option value="btech">B.Tech</option>
                    <option value="mca">MCA</option>
                    <option value="mba">MBA</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date-Of-Birth</label>
                <input type="date" name="dob">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>
            <div class="form-group">
                <label>Student Photo</label>
                <input type="file" name="photo">
            </div>
        </div>

        <div class="form-group">
            <label>Select Branch</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="branch" value="cse"> CSE</label>
                <label><input type="checkbox" name="branch" value="it"> IT</label>
                <label><input type="checkbox" name="branch" value="ece"> ECE</label>
                <label><input type="checkbox" name="branch" value="civil"> Civil</label>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

</body>
</html>
