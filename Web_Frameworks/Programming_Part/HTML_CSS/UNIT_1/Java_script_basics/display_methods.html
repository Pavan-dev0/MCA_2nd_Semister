<!DOCTYPE html>
<html>
<head>
    <title>Display JS</title>
</head>
<body>
    <h1>JS Display Process</h1>
    <p id="demo"></p>

    <script>
  
        document.getElementById("demo").innerHTML = "Hello using innerHTML";

        document.write("<p>This is text written using JavaScript</p>");
        document.write("Hello Welcome buddy");

        alert("Hello using alert box!");
        console.log("Hello using the console.log()!");

        
        window.print();
    </script>
</body>
</html>
