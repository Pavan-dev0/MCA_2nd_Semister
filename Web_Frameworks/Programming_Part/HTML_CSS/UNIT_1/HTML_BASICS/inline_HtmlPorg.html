<!DOCTYPE html>
<html>
<head>
    <title>Pseudo Classes</title>
    <style type="text/css">
        input:hover {
            background: lightgray;
            color: rgb(203, 190, 50);
        }
        input:focus {
            background: lightblue;
            color: rgb(180, 239, 85);
        }
        a.new:link {
            color: green;
        }
        a.new:visited {
            color: rgb(8, 199, 241);
        }
        a.new:hover {
            color: rgb(255, 173, 32);
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">We are really doing greatest things</h1>
    <p>As I am a citizen of India, I ought to be a proud person of my mom and dad:</p>

    <p>Try typing here:</p>
    <input type="text" placeholder="Hover or focus me">

    <p>Check out this link:</p>
    <a class="new" href="https://www.example.com">Go to Example</a>
</body>
</html>
