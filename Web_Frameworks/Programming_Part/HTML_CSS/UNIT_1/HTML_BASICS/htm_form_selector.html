<!DOCTYPE html>
<html>
    <head>
        <title>Styles Combined</title>
        <style type="text/css">
            h1,h3{border-bottom: 1px solid black;}
            h2{
                font-size: 24pt;font-weight: bold;
            }
            h3{
                font-size: 18pt;
                color:rgb(255, 170, 0);
            }

            .greentext{color:green}
            .bluetext{color:blue}

            .purpletext{
                color:purple
            }
            .sizelarge{
                font-size: 16pt;
            }

            *{font-family: 'Times New Roman', Times, serif;color:black;font-size:12pt}
            <!-- -->
            #appendix{
                font-size: 300%;
                font-family: 'Arial';
                border-top:3px dashed;
                border-bottom: 1px dotted;
                color:maroon;

            }
        </style>
    </head>
    <body style="background-color:slategrey;">
        <h2 class="greentext sizelarge" style="text-align: center;text-shadow: 0cqmax;">chapter 1 Introduction</h2>
        <h3> 1.2 The basics of computer networks</h3>

        <p style="color: powderblue;">If a job is worth doing its worth the doing right </p>
        <p class="purpletext sizelarge">
            Two Wrongs dont make a right but they certainly can get you in a lot of trouble
        </p>
    </body>

</html>
