<!DOCTYPE html>
<html>
    <!--A table.html an example of a simple table-->
    <head>
        <title>A simple Table</title>
    </head>
    <body>
        <table border=10>
            <caption>Fruit Juice Drinks</caption>
            <th rowspan="1">HELLO</th>
            <th colspan="3">FRUITS</th>
            <tr>
                <th bgcolor="grey"></th>
                <th>Apple</th>
                <th>Orange</th>
                <th>Banana</th>
            </tr>
            <tr>
                <th>Breakfast</th>
                <td>0</td>
                <td>1</td>
                <td>0</td>
            </tr>
            <tr>
            <th>Lunch</th>
            <td>1</td>
            <td>0</td>
            <td>0</td>
            </tr>
            <tr>
            <th>Dinner</th>
            <td>0</td>
            <td>0</td>
            <td>1</td>
            </tr>         
        </table>
    </body>
</html>
